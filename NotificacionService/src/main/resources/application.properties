
spring.application.name=MS-NOTIFICACION
server.port=8099
spring.profiles.active=dev


eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}


spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/db_notificacion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
